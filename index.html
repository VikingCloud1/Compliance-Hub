<script>
const _URL = "YOUR_SUPABASE_URL";
const _KEY = "YOUR_SUPABASE_ANON_KEY";
const supabaseClient = supabase.createClient(_URL, _KEY);

let currentUser = null;
let isEditor = false;

/* ---------------- AUTH ---------------- */

async function loginEditor() {
    const email = document.getElementById('editorId').value;
    const password = document.getElementById('editorPass').value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
    });

    if (error) {
        alert("Login failed");
        return;
    }

    currentUser = data.user;

    // Check role
    const { data: profile } = await supabaseClient
        .from('profiles')
        .select('role')
        .eq('id', currentUser.id)
        .single();

    if (profile?.role === 'editor') {
        isEditor = true;
        initializeDashboard();
    } else {
        alert("Access denied.");
        await supabaseClient.auth.signOut();
    }
}

async function logout() {
    await supabaseClient.auth.signOut();
    location.reload();
}

/* ---------------- DASHBOARD INIT ---------------- */

function initializeDashboard() {
    document.getElementById('editorPassSection').classList.add('hidden');
    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById('mainDashboard').classList.remove('hidden');
    document.getElementById('logoutNav').classList.remove('hidden');

    if (isEditor) {
        document.getElementById('pubBtn').classList.remove('hidden');
    }

    loadPosts();
}

/* ---------------- LOAD POSTS ---------------- */

async function loadPosts() {
    const feed = document.getElementById('feed');
    feed.innerHTML = "Loading...";

    const { data, error } = await supabaseClient
        .from('posts')
        .select('*')
        .order('created_at', { ascending: false });

    feed.innerHTML = "";

    if (!data || data.length === 0) {
        feed.innerHTML = "<p>No updates yet.</p>";
        return;
    }

    data.forEach(post => {
        const card = document.createElement('div');
        card.className = 'notepad';
        card.onclick = () => expandNote(post);

        const title = document.createElement('h3');
        title.textContent = post.title;

        const content = document.createElement('p');
        content.textContent = post.content;

        card.appendChild(title);
        card.appendChild(content);

        if (isEditor) {
            const adminDiv = document.createElement('div');
            adminDiv.style.marginTop = "auto";

            const editBtn = document.createElement('button');
            editBtn.className = 'edit-btn';
            editBtn.textContent = "Edit";
            editBtn.onclick = (e) => {
                e.stopPropagation();
                openEditModal(post);
            };

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.textContent = "Delete";
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                deletePost(post.id);
            };

            adminDiv.appendChild(editBtn);
            adminDiv.appendChild(deleteBtn);
            card.appendChild(adminDiv);
        } else {
            const date = document.createElement('div');
            date.className = 'post-date';
            date.textContent = new Date(post.created_at).toLocaleString();
            card.appendChild(date);
        }

        feed.appendChild(card);
    });
}

/* ---------------- CRUD ---------------- */

async function savePost() {
    const title = document.getElementById('postTitle').value;
    const content = document.getElementById('postContent').value;
    const id = document.getElementById('editId').value;

    if (!title || !content) {
        alert("Title and content required");
        return;
    }

    if (id) {
        await supabaseClient.from('posts')
            .update({ title, content })
            .eq('id', id);
    } else {
        await supabaseClient.from('posts')
            .insert([{ title, content }]);
    }

    closeModal();
    loadPosts();
}

async function deletePost(id) {
    if (confirm("Permanently delete this?")) {
        await supabaseClient.from('posts')
            .delete()
            .eq('id', id);
        loadPosts();
    }
}

/* ---------------- VIEW ---------------- */

function expandNote(post) {
    document.getElementById('mainDashboard').classList.add('hidden');
    document.getElementById('vTitle').textContent = post.title;
    document.getElementById('vDate').textContent =
        "Timestamp: " + new Date(post.created_at).toLocaleString();
    document.getElementById('vContent').textContent = post.content;
    document.getElementById('viewArea').classList.add('active');
    window.scrollTo(0, 0);
}

function closeViewingMode() {
    document.getElementById('viewArea').classList.remove('active');
    document.getElementById('mainDashboard').classList.remove('hidden');
}

/* ---------------- MODAL ---------------- */

function openModal() {
    document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
    document.getElementById('editId').value = '';
    document.getElementById('postTitle').value = '';
    document.getElementById('postContent').value = '';
}

function openEditModal(post) {
    document.getElementById('editId').value = post.id;
    document.getElementById('postTitle').value = post.title;
    document.getElementById('postContent').value = post.content;
    openModal();
}

/* ---------------- INIT ---------------- */

document.getElementById("logoutNav").onclick = logout;
document.querySelector("button[onclick='verifyEditor()']")
    .setAttribute("onclick", "loginEditor()");

</script>


<!DOCTYPE html>
<html>
<head>
  <title>Compliance Hub</title>
</head>
<body>

<h1>Compliance Hub</h1>
<div id="posts"></div>

<!-- ✅ Correct Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const { createClient } = supabase;

  const supabaseUrl = "YOUR_SUPABASE_URL";
  const supabaseKey = "YOUR_SUPABASE_ANON_KEY";

  const client = createClient(supabaseUrl, supabaseKey);

  async function loadPosts() {
    const { data, error } = await client
      .from("posts")
      .select("*");

    if (error) {
      console.error(error);
      return;
    }

    const container = document.getElementById("posts");
    container.innerHTML = "";

    data.forEach(post => {
      container.innerHTML += `
        <h3>${post.title}</h3>
        <p>${post.content}</p>
        <hr/>
      `;
    });
  }

  loadPosts();
</script>

</body>
</html>
