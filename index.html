<!DOCTYPE html>
<html>
<head>
  <title>VikingCloud Compliance Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      overflow-x: hidden;
      position: relative;
      color: white;
    }

    /* 15% Background Image Layer */
    .bg-image {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.15;
      z-index: -1;
      transition: 0.4s ease;
    }

    /* Top Bar */
    .topbar {
      position: fixed;
      top: 25px;
      left: 40px;
      right: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      font-size: 22px;
      opacity: 0.85;
    }

    .controls {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    select, button {
      padding: 8px 15px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: rgba(0,0,0,0.5);
      color: white;
    }

    /* Search */
    .search-container {
      position: fixed;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
    }

    .search-container input {
      width: 320px;
      padding: 12px 20px;
      border-radius: 25px;
      border: none;
      outline: none;
      background: rgba(0,0,0,0.4);
      color: white;
    }

    /* Empty Message */
    .center-message {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      opacity: 0.6;
    }

    /* Posts */
    .posts {
      margin-top: 120px;
      padding: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      padding: 20px;
      border-radius: 16px;
    }

    .card h3 {
      margin-bottom: 10px;
    }

    /* Login Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-box {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
    }

    .modal-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
  </style>
</head>

<body>

  <div class="bg-image" id="bgImage"></div>

  <div class="topbar">
    <div class="title">All Notes</div>

    <div class="controls">
      <button onclick="openLogin()">Editor Login</button>

      <select onchange="changeTheme(this.value)">
        <option value="forest">Forest</option>
        <option value="dark">Dark</option>
        <option value="cream">Cream</option>
      </select>
    </div>
  </div>

  <div class="search-container">
    <input type="text" placeholder="🔎 Search notes..." oninput="filterPosts(this.value)">
  </div>

  <div class="center-message" id="emptyMessage">
    No notes yet. Create one!
  </div>

  <div class="posts" id="posts"></div>

  <!-- Login Modal -->
  <div class="modal" id="loginModal">
    <div class="modal-box">
      <h3>Editor Login</h3>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>
  </div>

  <script>
    /* ✅ YOUR SUPABASE DETAILS (ALWAYS INCLUDED) */
    const supabaseUrl = "https://rspfzjybkicxgvcfqdzh.supabase.co";

    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzcGZ6anlia2ljeGd2Y2ZxZHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjU3ODksImV4cCI6MjA4NzYwMTc4OX0.kVazGMs9wsgw8Beuii06TVx6hxhVbAWWabfal3pVh-w";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    let isEditor = false;

    function changeTheme(theme) {
      const bg = document.getElementById("bgImage");

      if (theme === "forest") {
        bg.style.backgroundImage = "url('https://images.unsplash.com/photo-1501785888041-af3ef285b470')";
        document.body.style.backgroundColor = "#0f2f1f";
        document.body.style.color = "white";
      }

      if (theme === "dark") {
        bg.style.backgroundImage = "url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')";
        document.body.style.backgroundColor = "#111";
        document.body.style.color = "white";
      }

      if (theme === "cream") {
        bg.style.backgroundImage = "none";
        document.body.style.backgroundColor = "#f5efe6";
        document.body.style.color = "#333";
      }
    }

    changeTheme("forest");

    async function loadPosts() {
      const { data } = await supabaseClient
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false });

      const container = document.getElementById("posts");
      container.innerHTML = "";

      if (!data || data.length === 0) {
        document.getElementById("emptyMessage").style.display = "block";
        return;
      }

      document.getElementById("emptyMessage").style.display = "none";

      data.forEach(post => {
        container.innerHTML += `
          <div class="card">
            <h3>${post.title}</h3>
            <p>${post.content}</p>
          </div>
        `;
      });
    }

    function filterPosts(search) {
      const cards = document.querySelectorAll(".card");
      cards.forEach(card => {
        card.style.display =
          card.innerText.toLowerCase().includes(search.toLowerCase())
          ? "block"
          : "none";
      });
    }

    function openLogin() {
      document.getElementById("loginModal").style.display = "flex";
    }

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (!error) {
        isEditor = true;
        alert("Logged in as Editor");
        document.getElementById("loginModal").style.display = "none";
      } else {
        alert("Login failed");
      }
    }

    loadPosts();
  </script>

</body>
</html>
