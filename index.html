<!DOCTYPE html>
<html>
<head>
  <title>VikingCloud - Compliance Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* CSS THEMES */
    :root { --bg: #111; --text: #fff; --accent: #f39c12; --card: rgba(255,255,255,0.08); --blur: blur(10px); }
    .theme-cloud { --bg: #0f2027; --card: rgba(255,255,255,0.15); }
    .theme-corp { --bg: #f4f7f6; --text: #1a3668; --card: #ffffff; --accent: #1a3668; }

    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; transition: 0.3s ease; }
    body { background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }
    
    .hidden { display: none !important; }

    /* SPLASH GREETING */
    #splash {
        position: fixed; inset: 0; background: #111; z-index: 5000;
        display: flex; justify-content: center; align-items: center;
        font-size: 2.5em; font-weight: bold; color: var(--accent);
    }

    /* PAGE 1: LOGIN SELECTION */
    #loginPage { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .role-container { display: flex; gap: 20px; margin-top: 30px; }
    .role-card { 
        background: var(--card); padding: 40px; border-radius: 20px; width: 280px; cursor: pointer;
        border: 1px solid rgba(255,255,255,0.1); backdrop-filter: var(--blur);
    }
    .role-card:hover { transform: translateY(-10px); border-color: var(--accent); }

    /* PAGE 2: DASHBOARD */
    .topbar { position: fixed; top: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 100; background: var(--bg); border-bottom: 1px solid rgba(255,255,255,0.1); }
    .theme-icons span { cursor: pointer; margin-left: 15px; font-size: 1.2em; }

    /* GRID SYSTEM: 5x5 Pattern */
    .feed-grid { 
        display: grid; 
        grid-template-columns: repeat(5, 1fr); 
        gap: 20px; 
        padding: 120px 40px 40px; 
    }
    .sticky-note { 
        background: var(--card); height: 240px; padding: 20px; border-radius: 12px;
        border-bottom: 4px solid var(--accent); cursor: pointer;
        display: flex; flex-direction: column; justify-content: space-between;
    }
    .sticky-note:hover { transform: scale(1.03); }
    .sticky-note h3 { font-size: 1.1em; color: var(--accent); }
    .sticky-note p { font-size: 0.85em; opacity: 0.8; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; }

    /* FULL PAGE MODES */
    .full-overlay { 
        position: fixed; inset: 0; background: var(--bg); z-index: 1000; 
        padding: 60px; display: none; overflow-y: auto;
    }
    .active { display: block !important; }
    .content-max { max-width: 900px; margin: 0 auto; }

    /* UI ELEMENTS */
    .btn { padding: 10px 20px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; margin-right: 5px; }
    .btn-create { background: var(--accent); color: #fff; }
    .btn-edit { background: #3498db; color: #fff; font-size: 0.7em; }
    .btn-delete { background: #e74c3c; color: #fff; font-size: 0.7em; }
    
    input, textarea { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.05); color: white; border: 1px solid #444; border-radius: 8px; }
  </style>
</head>
<body class="theme-cloud">

    <div id="splash" class="hidden"></div>

    <div id="loginPage">
        <h1>VikingCloud Compliance Hub</h1>
        <div class="role-container">
            <div class="role-card" onclick="startLogin('editor')">
                <h2>Editor</h2>
                <p>Manage compliance updates and team access.</p>
            </div>
            <div class="role-card" onclick="startLogin('viewer')">
                <h2>Viewer</h2>
                <p>Read-only access to compliance notes.</p>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="hidden">
        <div class="topbar">
            <div>
                <span id="welcomeMsg" style="font-weight:bold; font-size:1.2em;">VikingCloud Hub</span>
            </div>
            <div class="theme-icons">
                <span onclick="setTheme('dark')">🌑</span>
                <span onclick="setTheme('cloud')">☁️</span>
                <span onclick="setTheme('corp')">🏢</span>
            </div>
            <div>
                <button id="addEditorBtn" class="btn hidden" style="background:#8e44ad; color:white;" onclick="inviteEditor()">+ Add Editor</button>
                <button id="createTrigger" class="btn btn-create hidden" onclick="openEditor()">+ Create Note</button>
                <button class="btn" onclick="location.reload()" style="background:#444; color:#fff;">Logout</button>
            </div>
        </div>
        <div id="feed" class="feed-grid"></div>
    </div>

    <div id="fullView" class="full-overlay">
        <button class="btn" onclick="closeFullView()">← Back</button>
        <div class="content-max">
            <h1 id="viewTitle"></h1>
            <p id="viewBody"></p>
        </div>
    </div>

    <div id="noteEditor" class="full-overlay">
        <div class="content-max">
            <h1 id="editorHeading">Create Update</h1>
            <input type="hidden" id="editId">
            <input type="text" id="postTitle" placeholder="Title...">
            <textarea id="postContent" rows="15" placeholder="Details..."></textarea>
            <button class="btn btn-create" onclick="saveNote()">Save & Publish</button>
            <button class="btn" onclick="closeNoteEditor()" style="background:none; color:gray;">Cancel</button>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://rspfzjybkicxgvcfqdzh.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzcGZ6anlia2ljeGd2Y2ZxZHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjU3ODksImV4cCI6MjA4NzYwMTc4OX0.kVazGMs9wsgw8Beuii06TVx6hxhVbAWWabfal3pVh-w";
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUserRole = 'viewer';
        let editorName = "";

        async function startLogin(role) {
            if (role === 'editor') {
                const name = prompt("Enter your Name:");
                if(!name) return;
                editorName = name;
                currentUserRole = 'editor';
                showSplash(`Welcome, Editor ${name}`);
            } else {
                currentUserRole = 'viewer';
                enterDashboard();
            }
        }

        function showSplash(msg) {
            const s = document.getElementById('splash');
            s.innerText = msg;
            s.classList.remove('hidden');
            setTimeout(() => {
                s.classList.add('hidden');
                enterDashboard();
            }, 2000);
        }

        function enterDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            if (currentUserRole === 'editor') {
                document.getElementById('welcomeMsg').innerText = `Hello, ${editorName}`;
                document.getElementById('createTrigger').classList.remove('hidden');
                document.getElementById('addEditorBtn').classList.remove('hidden');
            }
            loadNotes();
        }

        async function loadNotes() {
            const { data } = await client.from('posts').select('*').order('created_at', { ascending: false });
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            data.forEach(note => {
                const card = document.createElement('div');
                card.className = 'sticky-note';
                card.onclick = () => viewNote(note);
                
                let controls = '';
                if(currentUserRole === 'editor') {
                    controls = `<div>
                        <button class="btn btn-edit" onclick="event.stopPropagation(); openEditNote(${JSON.stringify(note).replace(/"/g, '&quot;')})">Edit</button>
                        <button class="btn btn-delete" onclick="event.stopPropagation(); deleteNote(${note.id})">Delete</button>
                    </div>`;
                }
                
                card.innerHTML = `<div><h3>${note.title}</h3><p>${note.content}</p></div>${controls}`;
                feed.appendChild(card);
            });
        }

        async function saveNote() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            const id = document.getElementById('editId').value;
            
            if(id) {
                await client.from('posts').update({ title, content }).eq('id', id);
            } else {
                await client.from('posts').insert([{ title, content }]);
            }
            closeNoteEditor();
            loadNotes();
        }

        function openEditNote(note) {
            document.getElementById('editorHeading').innerText = "Edit Update";
            document.getElementById('editId').value = note.id;
            document.getElementById('postTitle').value = note.title;
            document.getElementById('postContent').value = note.content;
            document.getElementById('noteEditor').classList.add('active');
        }

        async function deleteNote(id) {
            if(confirm("Delete this?")) {
                await client.from('posts').delete().eq('id', id);
                loadNotes();
            }
        }

        function inviteEditor() {
            const email = prompt("Enter the email of the new Editor to authorize:");
            if(email) alert(`Access invitation sent to ${email} (Mock Logic)`);
        }

        function viewNote(note) {
            document.getElementById('viewTitle').innerText = note.title;
            document.getElementById('viewBody').innerText = note.content;
            document.getElementById('fullView').classList.add('active');
        }

        function closeFullView() { document.getElementById('fullView').classList.remove('active'); }
        function openEditor() { 
            document.getElementById('editorHeading').innerText = "Create Update";
            document.getElementById('noteEditor').classList.add('active'); 
        }
        function closeNoteEditor() { 
            document.getElementById('noteEditor').classList.remove('active');
            document.getElementById('editId').value = '';
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
        }
        function setTheme(t) { document.body.className = 'theme-' + t; }
    </script>
</body>
</html>
