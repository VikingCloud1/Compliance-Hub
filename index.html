<!DOCTYPE html>
<html>
<head>
  <title>VikingCloud Compliance Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      transition: 0.4s ease;
    }

    /* Top Bar */
    .topbar {
      position: absolute;
      top: 25px;
      left: 40px;
      right: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      font-size: 22px;
      font-weight: 500;
      opacity: 0.9;
    }

    .search-container {
      position: absolute;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
    }

    .search-container input {
      width: 320px;
      padding: 12px 20px;
      border-radius: 25px;
      border: none;
      outline: none;
      font-size: 14px;
      background: rgba(0,0,0,0.35);
      color: white;
      backdrop-filter: blur(6px);
    }

    .theme-select {
      padding: 8px 15px;
      border-radius: 20px;
      border: none;
      background: rgba(0,0,0,0.4);
      color: white;
      cursor: pointer;
    }

    .center-message {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      opacity: 0.7;
    }

  </style>
</head>

<body id="body">

  <div class="topbar">
    <div class="title">All Notes</div>
    <select class="theme-select" onchange="changeTheme(this.value)">
      <option value="forest">Forest</option>
      <option value="dark">Dark</option>
      <option value="cream">Cream</option>
    </select>
  </div>

  <div class="search-container">
    <input type="text" placeholder="🔎  Search notes...">
  </div>

  <div class="center-message">
    No notes yet. Create one!
  </div>

  <script>
    const supabaseUrl = "https://rspfzjybkicxgvcfqdzh.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzcGZ6anlia2ljeGd2Y2ZxZHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjU3ODksImV4cCI6MjA4NzYwMTc4OX0.kVazGMs9wsgw8Beuii06TVx6hxhVbAWWabfal3pVh-w";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    function changeTheme(theme) {
      const body = document.getElementById("body");

      if (theme === "forest") {
        body.style.backgroundImage = "url('https://images.unsplash.com/photo-1501785888041-af3ef285b470')";
        body.style.color = "white";
      }

      if (theme === "dark") {
        body.style.backgroundImage = "url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')";
        body.style.color = "white";
      }

      if (theme === "cream") {
        body.style.backgroundImage = "none";
        body.style.backgroundColor = "#f5efe6";
        body.style.color = "#333";
      }
    }

    changeTheme("forest"); // default theme
  </script>

</body>
</html>
