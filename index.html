<!DOCTYPE html>
<html>
<head>
  <title>VikingCloud Compliance Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI; }

    body {
      height:100vh;
      overflow-x:hidden;
      position:relative;
      color:white;
    }

    .hidden { display:none; }

    /* 15% Background */
    .bg-image {
      position:fixed;
      inset:0;
      background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');
      background-size:cover;
      background-position:center;
      opacity:0.15;
      z-index:-1;
    }

    /* Login Screen */
    .login-screen {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#111;
    }

    .login-box {
      background:white;
      color:black;
      padding:40px;
      border-radius:12px;
      width:320px;
    }

    .login-box input {
      width:100%;
      padding:10px;
      margin:10px 0;
    }

    .login-box button {
      width:100%;
      padding:10px;
      cursor:pointer;
    }

    /* Landing */
    .topbar {
      position:fixed;
      top:25px;
      left:40px;
      right:40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .posts {
      margin-top:120px;
      padding:40px;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
      gap:20px;
    }

    .card {
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(8px);
      padding:20px;
      border-radius:16px;
    }

    .center-message {
      position:absolute;
      top:45%;
      left:50%;
      transform:translate(-50%,-50%);
      opacity:0.6;
    }

  </style>
</head>

<body>

  <!-- LOGIN SCREEN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h3>Compliance Hub Login</h3>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <p style="font-size:12px;margin-top:10px;">
        Editor: admin@vikingcloud.com  
      </p>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <div class="bg-image"></div>

    <div class="topbar">
      <div>All Notes</div>
      <div>
        <button id="createBtn" class="hidden" onclick="createPost()">+ Create</button>
        <button id="changeCredBtn" class="hidden" onclick="changeCredentials()">Change Login</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="center-message" id="emptyMessage">
      No notes yet.
    </div>

    <div class="posts" id="posts"></div>
  </div>

  <script>
    /* ✅ YOUR SUPABASE DETAILS (ALWAYS INCLUDED) */
    const supabaseUrl = "https://rspfzjybkicxgvcfqdzh.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzcGZ6anlia2ljeGd2Y2ZxZHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjU3ODksImV4cCI6MjA4NzYwMTc4OX0.kVazGMs9wsgw8Beuii06TVx6hxhVbAWWabfal3pVh-w";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    /* Default Credentials */
    let editorUsername = "admin@vikingcloud.com";
    let editorPassword = "admin@vikingcloud.com";

    let userRole = "viewer";

    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      if (username === editorUsername && password === editorPassword) {
        userRole = "editor";
      } else {
        userRole = "viewer";
      }

      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");

      if (userRole === "editor") {
        document.getElementById("createBtn").classList.remove("hidden");
        document.getElementById("changeCredBtn").classList.remove("hidden");
      }

      loadPosts();
    }

    function logout() {
      location.reload();
    }

    async function loadPosts() {
      const { data } = await supabaseClient
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false });

      const container = document.getElementById("posts");
      container.innerHTML = "";

      if (!data || data.length === 0) {
        document.getElementById("emptyMessage").style.display = "block";
        return;
      }

      document.getElementById("emptyMessage").style.display = "none";

      data.forEach(post => {
        container.innerHTML += `
          <div class="card">
            <h3>${post.title}</h3>
            <p>${post.content}</p>
          </div>
        `;
      });
    }

    function createPost() {
      if (userRole !== "editor") return;
      alert("Editor can create post (we can add modal next).");
    }

    function changeCredentials() {
      if (userRole !== "editor") return;

      const newUser = prompt("Enter new username:");
      const newPass = prompt("Enter new password:");

      if (newUser && newPass) {
        editorUsername = newUser;
        editorPassword = newPass;
        alert("Credentials updated successfully.");
      }
    }
  </script>

</body>
</html>
